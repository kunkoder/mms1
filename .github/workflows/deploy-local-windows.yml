name: Deploy to Local Laptop

on:
  push:
    branches: [dev, test, main]

jobs:
  deploy:
    runs-on: self-hosted # Uses the runner in D:\Gema\remake-mms\actions-runner
    
    strategy:
      matrix:
        include:
          - branch: dev
            env_name: development
            deploy_path: "D:\\Gema\\remake-mms\\dev"
            port: 3001
            pm2_name: "mms1-dev"
          - branch: test
            env_name: testing
            deploy_path: "D:\\Gema\\remake-mms\\test"
            port: 3002
            pm2_name: "mms1-test"
          - branch: main
            env_name: production
            deploy_path: "D:\\Gema\\remake-mms\\prod"
            port: 3000
            pm2_name: "mms1-prod"

    if: github.ref == format('refs/heads/{0}', matrix.branch)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build
        env:
          NEXT_PUBLIC_ENV: ${{ matrix.env_name }}

      - name: Deploy to Local Folder
        shell: pwsh
        run: |
          $source = ".next\standalone"
          $dest = "${{ matrix.deploy_path }}"
          
          # Clean destination to avoid old file conflicts
          if (Test-Path $dest) {
            Remove-Item -Path "$dest\*" -Recurse -Force -ErrorAction SilentlyContinue
          }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          
          # Copy standalone server
          Copy-Item -Path "$source\*" -Destination $dest -Recurse -Force
          
          # Copy static assets (Required for Next.js standalone)
          New-Item -ItemType Directory -Force -Path "$dest\.next\static" | Out-Null
          Copy-Item -Path ".next\static" -Destination "$dest\.next\static" -Recurse -Force
          
          Write-Host "✅ Deployed to $dest"

      - name: Restart PM2 Service
        shell: pwsh
        run: |
          $pm2Name = "${{ matrix.pm2_name }}"
          $port = "${{ matrix.port }}"
          $deployPath = "${{ matrix.deploy_path }}"
          
          Set-Location $deployPath
          
          # Delete old process if exists
          pm2 delete $pm2Name --silent 2>$null
          
          # Start the server.js generated by standalone build
          pm2 start server.js --name $pm2Name --port $port
          
          pm2 save
          Write-Host "✅ $pm2Name is running on port $port"