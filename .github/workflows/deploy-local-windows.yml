name: Deploy to Local Laptop

on:
  push:
    branches: [dev, test, main]

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: self-hosted
    steps:
      - name: 🛒 Checkout Code
        uses: actions/checkout@v4
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: 📦 Install Dependencies
        run: npm ci
      - name: 🔨 Build Application
        run: npm run build
        env:
          NEXT_PUBLIC_ENV: development
      - name: 🚀 Deploy to Dev Folder
        shell: powershell
        run: |
          $source = ".next\standalone"
          $dest = "D:\\Gema\\remake-mms\\dev"
          if (Test-Path $dest) { Remove-Item -Path "$dest\*" -Recurse -Force -ErrorAction SilentlyContinue }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$source\*" -Destination $dest -Recurse -Force
          New-Item -ItemType Directory -Force -Path "$dest\.next\static" | Out-Null
          Copy-Item -Path ".next\static\*" -Destination "$dest\.next\static" -Recurse -Force
      - name: 🔄 Start/Restart PM2 (Dev)
        shell: powershell
        run: |
          Set-Location "D:\\Gema\\remake-mms\\dev"
          
          # Delete old process if exists
          pm2 delete mms1-dev --silent 2>$null
          
          # Start with explicit port argument. 
          # --update-env ensures new args are used if process existed
          pm2 start server.js --name mms1-dev -- -p 3001
          
          # Wait 2 seconds for server to boot
          Start-Sleep -Seconds 2
          
          # Health Check: Verify port 3001 is listening
          $listening = Get-NetTCPConnection -LocalPort 3001 -ErrorAction SilentlyContinue
          if ($listening) {
            Write-Host "✅ SUCCESS: mms1-dev is listening on port 3001"
          } else {
            Write-Host "❌ FAILED: Port 3001 is not listening. Checking logs..."
            pm2 logs mms1-dev --lines 10
            exit 1
          }

  deploy-test:
    if: github.ref == 'refs/heads/test'
    runs-on: self-hosted
    steps:
      - name: 🛒 Checkout Code
        uses: actions/checkout@v4
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: 📦 Install Dependencies
        run: npm ci
      - name: 🔨 Build Application
        run: npm run build
        env:
          NEXT_PUBLIC_ENV: testing
      - name: 🚀 Deploy to Test Folder
        shell: powershell
        run: |
          $source = ".next\standalone"
          $dest = "D:\\Gema\\remake-mms\\test"
          if (Test-Path $dest) { Remove-Item -Path "$dest\*" -Recurse -Force -ErrorAction SilentlyContinue }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$source\*" -Destination $dest -Recurse -Force
          New-Item -ItemType Directory -Force -Path "$dest\.next\static" | Out-Null
          Copy-Item -Path ".next\static\*" -Destination "$dest\.next\static" -Recurse -Force
      - name: 🔄 Start/Restart PM2 (Test)
        shell: powershell
        run: |
          Set-Location "D:\\Gema\\remake-mms\\test"
          pm2 delete mms1-test --silent 2>$null
          pm2 start server.js --name mms1-test -- -p 3002
          Start-Sleep -Seconds 2
          
          # Health Check
          $listening = Get-NetTCPConnection -LocalPort 3002 -ErrorAction SilentlyContinue
          if ($listening) {
            Write-Host "✅ SUCCESS: mms1-test is listening on port 3002"
          } else {
            Write-Host "❌ FAILED: Port 3002 is not listening."
            pm2 logs mms1-test --lines 10
            exit 1
          }

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: 🛒 Checkout Code
        uses: actions/checkout@v4
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: 📦 Install Dependencies
        run: npm ci
      - name: 🔨 Build Application
        run: npm run build
        env:
          NEXT_PUBLIC_ENV: production
      - name: 🚀 Deploy to Prod Folder
        shell: powershell
        run: |
          $source = ".next\standalone"
          $dest = "D:\\Gema\\remake-mms\\prod"
          if (Test-Path $dest) { Remove-Item -Path "$dest\*" -Recurse -Force -ErrorAction SilentlyContinue }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$source\*" -Destination $dest -Recurse -Force
          New-Item -ItemType Directory -Force -Path "$dest\.next\static" | Out-Null
          Copy-Item -Path ".next\static\*" -Destination "$dest\.next\static" -Recurse -Force
      - name: 🔄 Start/Restart PM2 (Prod)
        shell: powershell
        run: |
          Set-Location "D:\\Gema\\remake-mms\\prod"
          pm2 delete mms1-prod --silent 2>$null
          pm2 start server.js --name mms1-prod -- -p 3000
          Start-Sleep -Seconds 2
          
          # Health Check
          $listening = Get-NetTCPConnection -LocalPort 3000 -ErrorAction SilentlyContinue
          if ($listening) {
            Write-Host "✅ SUCCESS: mms1-prod is listening on port 3000"
          } else {
            Write-Host "❌ FAILED: Port 3000 is not listening."
            pm2 logs mms1-prod --lines 10
            exit 1
          }