name: Deploy to Local Laptop

on:
  push:
    branches: [dev, test, main]

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: self-hosted
    steps:
      - name: 🛒 Checkout Code
        uses: actions/checkout@v4
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: 📦 Install Dependencies
        run: npm ci
      - name: 🔨 Build Application
        run: npm run build
        env:
          NEXT_PUBLIC_ENV: development
      - name: 🚀 Deploy to Dev Folder
        shell: powershell
        run: |
          $source = ".next\standalone"
          $dest = "D:\\Gema\\remake-mms\\dev"
          if (Test-Path $dest) { Remove-Item -Path "$dest\*" -Recurse -Force -ErrorAction SilentlyContinue }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$source\*" -Destination $dest -Recurse -Force
          New-Item -ItemType Directory -Force -Path "$dest\.next\static" | Out-Null
          Copy-Item -Path ".next\static\*" -Destination "$dest\.next\static" -Recurse -Force
          
          # CREATE ECOSYSTEM CONFIG FOR PORT 3001
          $config = @"
          module.exports = {
            apps: [{
              name: 'mms1-dev',
              script: 'server.js',
              env: {
                PORT: 3001,
                NODE_ENV: 'development'
              }
            }]
          }
          "@
          Set-Content -Path "$dest\ecosystem.config.js" -Value $config
      - name: 🔄 Start/Restart PM2 (Dev)
        shell: powershell
        run: |
          Set-Location "D:\\Gema\\remake-mms\\dev"
          pm2 delete mms1-dev --silent 2>$null
          # Start using the config file
          pm2 start ecosystem.config.js
          Start-Sleep -Seconds 3
          
          # Health Check
          $listening = Get-NetTCPConnection -LocalPort 3001 -ErrorAction SilentlyContinue
          if ($listening) {
            Write-Host "✅ SUCCESS: mms1-dev is listening on port 3001"
          } else {
            Write-Host "❌ FAILED: Port 3001 is not listening."
            pm2 logs mms1-dev --lines 15
            exit 1
          }

