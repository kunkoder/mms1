name: Deploy to Local Laptop

on:
  push:
    branches: [dev, test, main]

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: self-hosted
    steps:
      - name: 🛒 Checkout Code
        uses: actions/checkout@v4
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: 📦 Install Dependencies
        run: npm ci
      - name: 🔨 Build Application
        run: npm run build
        env:
          NEXT_PUBLIC_ENV: development
      - name: 🚀 Deploy to Dev Folder
        shell: powershell
        run: |
          $source = ".next\standalone"
          $dest = "D:\\Gema\\remake-mms\\dev"
          if (Test-Path $dest) { Remove-Item -Path "$dest\*" -Recurse -Force -ErrorAction SilentlyContinue }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$source\*" -Destination $dest -Recurse -Force
          New-Item -ItemType Directory -Force -Path "$dest\.next\static" | Out-Null
          Copy-Item -Path ".next\static\*" -Destination "$dest\.next\static" -Recurse -Force
      - name: 🔄 Restart PM2 (Dev)
        shell: powershell
        run: |
          Set-Location "D:\\Gema\\remake-mms\\dev"
          pm2 delete mms1-dev --silent 2>$null
          # Use -e to set the PORT environment variable for the process
          pm2 start server.js --name mms1-dev -e PORT=3001
          pm2 save

  deploy-test:
    if: github.ref == 'refs/heads/test'
    runs-on: self-hosted
    steps:
      - name: 🛒 Checkout Code
        uses: actions/checkout@v4
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: 📦 Install Dependencies
        run: npm ci
      - name: 🔨 Build Application
        run: npm run build
        env:
          NEXT_PUBLIC_ENV: testing
      - name: 🚀 Deploy to Test Folder
        shell: powershell
        run: |
          $source = ".next\standalone"
          $dest = "D:\\Gema\\remake-mms\\test"
          if (Test-Path $dest) { Remove-Item -Path "$dest\*" -Recurse -Force -ErrorAction SilentlyContinue }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$source\*" -Destination $dest -Recurse -Force
          New-Item -ItemType Directory -Force -Path "$dest\.next\static" | Out-Null
          Copy-Item -Path ".next\static\*" -Destination "$dest\.next\static" -Recurse -Force
      - name: 🔄 Restart PM2 (Test)
        shell: powershell
        run: |
          Set-Location "D:\\Gema\\remake-mms\\test"
          pm2 delete mms1-test --silent 2>$null
          # Use -e to set the PORT environment variable for the process
          pm2 start server.js --name mms1-test -e PORT=3002
          pm2 save

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: 🛒 Checkout Code
        uses: actions/checkout@v4
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: 📦 Install Dependencies
        run: npm ci
      - name: 🔨 Build Application
        run: npm run build
        env:
          NEXT_PUBLIC_ENV: production
      - name: 🚀 Deploy to Prod Folder
        shell: powershell
        run: |
          $source = ".next\standalone"
          $dest = "D:\\Gema\\remake-mms\\prod"
          if (Test-Path $dest) { Remove-Item -Path "$dest\*" -Recurse -Force -ErrorAction SilentlyContinue }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$source\*" -Destination $dest -Recurse -Force
          New-Item -ItemType Directory -Force -Path "$dest\.next\static" | Out-Null
          Copy-Item -Path ".next\static\*" -Destination "$dest\.next\static" -Recurse -Force
      - name: 🔄 Restart PM2 (Prod)
        shell: powershell
        run: |
          Set-Location "D:\\Gema\\remake-mms\\prod"
          pm2 delete mms1-prod --silent 2>$null
          # Prod usually stays on default 3000, but let's be explicit
          pm2 start server.js --name mms1-prod -e PORT=3000
          pm2 save